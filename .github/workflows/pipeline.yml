name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install opencv-python-headless numpy matplotlib scipy scikit-image

      - name: Run script
        run: python code.py

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/watermarking-qim:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/watermarking-qim:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/watermarking-qim:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/watermarking-qim:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/watermarking-qim:latest